name: Deploy DocHunt

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install & Build
        run: |
          npm ci
          node ace build
          cd build && npm ci --omit=dev

      - name: Upload build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DOCHUNT_VPS_HOST }}
          username: dochunt
          key: ${{ secrets.DOCHUNT_VPS_SSH_KEY }}
          port: 52200
          source: "build/"
          target: "/var/www/dochunt/"

      - name: Restart app
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DOCHUNT_VPS_HOST }}
          username: dochunt
          key: ${{ secrets.DOCHUNT_VPS_SSH_KEY }}
          port: 52200
          script: |
            cp /var/www/dochunt/.env /var/www/dochunt/build/.env
            ln -sfn /var/www/dochunt/tmp /var/www/dochunt/build/tmp
            cd /var/www/dochunt/build && node ace migration:run
            pm2 restart dochunt --update-env
